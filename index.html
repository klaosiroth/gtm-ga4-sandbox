  <script>
  function trackConcertClick(concertName, musicGenre, startingPrice) {
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      'event': 'select_concert_intent',
      'concert_name': concertName,
      'concert_genre': musicGenre,
      'concert_start_price': startingPrice
    });
  }
  </script>
